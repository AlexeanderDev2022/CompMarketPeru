name: Build and deploy JAR app to Azure Web App - CompMarketPeru

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "microsoft"

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: "${{ github.workspace }}/target/*.jar"

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4EB5F23E4691495B8AF2A8A616A9F838 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D3B14F5C8110448295ED61E2EFFDD860 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C35170C62DE24A56B081AD4CE10DC7AC }}

      - name: Set App Settings (ENV vars)
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp config appsettings set \
              --name CompMarketPeru \
              --resource-group <TU_RESOURCE_GROUP> \
              --settings \
                DB_URL='${{ secrets.DB_URL }}' \
                DB_USERNAME='${{ secrets.DB_USERNAME }}' \
                DB_PASSWORD='${{ secrets.DB_PASSWORD }}'

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "CompMarketPeru"
          slot-name: "Production"
          package: "*.jar"
