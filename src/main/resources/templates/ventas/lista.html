<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Ventas - AUTODOC</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link th:href="@{/css/autodoc.css}" rel="stylesheet" />
  </head>
  <body>
    <div th:replace="~{fragments/nav :: nav}"></div>
    <div class="container">
      <h2 class="page-title mb-4">Listado de Ventas</h2>

      <a th:href="@{/ventas/nuevo}" class="btn btn-primary mb-3">Nueva Venta</a>

      <table class="table table-bordered table-striped">
        <thead>
          <tr>
            <th>ID</th>
            <th>Comprobante</th>
            <th>Fecha</th>
            <th>Cliente</th>
            <th>Vendedor</th>
            <th>Subtotal</th>
            <th>IGV</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="v : ${ventas}">
            <td th:text="${v.id_venta}"></td>
            <td
              th:text="${v.tipo_comprobante + ' ' + v.serie + '-' + v.correlativo}"
            ></td>
            <td
              th:text="${#temporals.format(v.fecha_venta, 'dd/MM/yyyy HH:mm')}"
            ></td>
            <td
              th:text="${v.cliente != null ? (v.cliente.nombres + ' ' + v.cliente.apellidos) : ''}"
            ></td>
            <td th:text="${v.usuario != null ? v.usuario.username : ''}"></td>
            <td
              th:text="${'S/ ' + #numbers.formatDecimal(v.subtotal, 1, 2)}"
            ></td>
            <td th:text="${'S/ ' + #numbers.formatDecimal(v.igv, 1, 2)}"></td>
            <td th:text="${'S/ ' + #numbers.formatDecimal(v.total, 1, 2)}"></td>
          </tr>
        </tbody>
      </table>
    </div>
    <div th:insert="~{fragments/footer :: footer}"></div>
  </body>
</html>
