<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Nueva Venta - AUTODOC</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link th:href="@{/css/autodoc.css}" rel="stylesheet" />
  </head>
  <body>
    <div th:replace="~{fragments/nav :: nav}"></div>
    <div class="container">
      <h2 class="page-title mb-4">Registrar Venta</h2>

      <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

      <form
        th:action="@{/ventas/guardar}"
        th:object="${venta}"
        method="post"
        id="ventaForm"
      >
        <div class="row g-3">
          <div class="col-md-3">
            <label>Serie</label>
            <input
              type="text"
              class="form-control"
              th:field="*{serie}"
              value="B001"
            />
          </div>

          <div class="col-md-3">
            <label>Tipo de Comprobante</label>
            <select class="form-control" th:field="*{tipo_comprobante}">
              <option value="BOLETA">Boleta</option>
              <option value="FACTURA">Factura</option>
            </select>
          </div>

          <div class="col-md-6">
            <label>Cliente</label>
            <select class="form-control" th:field="*{cliente}" required>
              <option value="">Seleccione un cliente</option>
              <option
                th:each="c : ${clientes}"
                th:value="${c.idCliente}"
                th:text="${c.nombres + ' ' + c.apellidos + ' - ' + c.nroDoc}"
              ></option>
            </select>
          </div>
        </div>

        <hr />

        <h5>Productos</h5>
        <table class="table table-bordered" id="tablaDetalle">
          <thead>
            <tr>
              <th>Producto</th>
              <th style="width: 120px">Cantidad</th>
              <th style="width: 60px"></th>
            </tr>
          </thead>
          <tbody id="detalleBody"></tbody>
        </table>

        <button
          type="button"
          class="btn btn-outline-primary btn-sm"
          id="btnAgregar"
        >
          + Agregar producto
        </button>

        <hr />

        <button type="submit" class="btn btn-success">Registrar Venta</button>
        <a th:href="@{/ventas}" class="btn btn-secondary">Cancelar</a>
      </form>
    </div>

    <!-- Lista de productos disponible para el JS, generada con Thymeleaf -->
    <script th:inline="javascript">
      const productos = /*[[${productos}]]*/ [];
      let fila = 0;

      function agregarFila() {
        const tbody = document.getElementById("detalleBody");
        const tr = document.createElement("tr");

        let opciones = '<option value="">Seleccione</option>';
        productos.forEach((p) => {
          opciones += `<option value="${p.id_producto}">${p.nombre} (Stock: ${p.stock}) - S/ ${p.precio_venta}</option>`;
        });

        tr.innerHTML = `
      <td>
        <select class="form-control" name="detalles[${fila}].producto" required>${opciones}</select>
      </td>
      <td>
        <input type="number" class="form-control" name="detalles[${fila}].cantidad" min="1" value="1" required>
      </td>
      <td>
        <button type="button" class="btn btn-danger btn-sm" onclick="this.closest('tr').remove()">X</button>
      </td>`;

        tbody.appendChild(tr);
        fila++;
      }

      document
        .getElementById("btnAgregar")
        .addEventListener("click", agregarFila);
      // Al menos una fila inicial
      agregarFila();
    </script>
    <div th:insert="~{fragments/footer :: footer}"></div>
  </body>
</html>
