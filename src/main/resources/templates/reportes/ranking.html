<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Ranking de Productos - AUTODOC</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link th:href="@{/css/autodoc.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">

  <h2 class="page-title mb-4">Ranking de Productos más Vendidos (mes actual)</h2>

  <table class="table table-bordered table-striped">
    <thead>
      <tr><th>#</th><th>Producto</th><th>Marca</th><th>Unidades Vendidas</th><th>Ingresos (S/)</th></tr>
    </thead>
    <tbody>
      <tr th:each="r, it : ${ranking}">
        <td th:text="${it.count}"></td>
        <td th:text="${r.nombre}"></td>
        <td th:text="${r.marca}"></td>
        <td th:text="${r.unidades_vendidas}"></td>
        <td th:text="${'S/ ' + #numbers.formatDecimal(r.ingresos_totales, 1, 2)}"></td>
      </tr>
      <tr th:if="${#lists.isEmpty(ranking)}">
        <td colspan="5" class="text-center text-muted">Aún no hay ventas registradas este mes.</td>
      </tr>
    </tbody>
  </table>
  <div th:insert="~{fragments/footer :: footer}"></div>
</div>
</body>
</html>
