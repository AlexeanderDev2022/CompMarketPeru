<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Cierre de Caja - AUTODOC</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link th:href="@{/css/autodoc.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">

  <h2 class="page-title mb-4">Cierre de Caja del Día</h2>

  <table class="table table-bordered table-striped">
    <thead>
      <tr><th>Comprobante</th><th>Cantidad</th><th>Subtotal (S/)</th><th>IGV (S/)</th><th>Total (S/)</th></tr>
    </thead>
    <tbody>
      <tr th:each="c : ${cierre}">
        <td th:text="${c.tipo_comprobante}"></td>
        <td th:text="${c.cantidad_ventas}"></td>
        <td th:text="${'S/ ' + #numbers.formatDecimal(c.total_subtotal, 1, 2)}"></td>
        <td th:text="${'S/ ' + #numbers.formatDecimal(c.total_igv, 1, 2)}"></td>
        <td th:text="${'S/ ' + #numbers.formatDecimal(c.total_general, 1, 2)}"></td>
      </tr>
      <tr th:if="${#lists.isEmpty(cierre)}">
        <td colspan="5" class="text-center text-muted">No se han registrado ventas hoy.</td>
      </tr>
    </tbody>
  </table>

</div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</body>
</html>
