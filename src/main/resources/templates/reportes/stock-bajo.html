<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Stock Bajo - AUTODOC</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link th:href="@{/css/autodoc.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">

  <h2 class="page-title mb-4">Reporte: Productos con Stock Bajo</h2>
  <p class="text-muted">Productos cuyo stock actual está en el mínimo o por debajo de él.</p>

  <table class="table table-bordered table-striped">
    <thead>
      <tr><th>Producto</th><th>Marca</th><th>Categoría</th><th>Stock</th><th>Stock Mínimo</th></tr>
    </thead>
    <tbody>
      <tr th:each="p : ${productos}">
        <td th:text="${p.nombre}"></td>
        <td th:text="${p.marca}"></td>
        <td th:text="${p.categoria}"></td>
        <td><span class="badge bg-danger" th:text="${p.stock}"></span></td>
        <td th:text="${p.stock_minimo}"></td>
      </tr>
      <tr th:if="${#lists.isEmpty(productos)}">
        <td colspan="5" class="text-center text-muted">No hay productos con stock bajo. ✅</td>
      </tr>
    </tbody>
  </table>

</div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</body>
</html>
