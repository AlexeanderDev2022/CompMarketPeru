<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Roles - AUTODOC</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link th:href="@{/css/autodoc.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">

  <h2 class="page-title mb-4">Roles del Sistema</h2>
  <a th:href="@{/roles/nuevo}" class="btn btn-success mb-3">Nuevo Rol</a>

  <table class="table table-bordered table-striped">
    <thead><tr><th>ID</th><th>Nombre</th><th>Descripción</th><th>Estado</th><th>Acciones</th></tr></thead>
    <tbody>
      <tr th:each="r : ${roles}">
        <td th:text="${r.id_rol}"></td>
        <td th:text="${r.nombre_rol}"></td>
        <td th:text="${r.descripcion}"></td>
        <td th:text="${r.estado == 1 ? 'Activo' : 'Inactivo'}"></td>
        <td>
          <a class="btn btn-warning btn-sm" th:href="@{/roles/editar/{id}(id=${r.id_rol})}">Editar</a>
          <a class="btn btn-danger btn-sm" th:href="@{/roles/eliminar/{id}(id=${r.id_rol})}"
             onclick="return confirm('¿Eliminar este rol?');">Eliminar</a>
        </td>
      </tr>
    </tbody>
  </table>

</div>
</body>
</html>
