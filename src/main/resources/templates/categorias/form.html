<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Categoría - AUTODOC</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link th:href="@{/css/autodoc.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">

  <h2 class="page-title mb-4">Registro de Categoría</h2>

  <form th:action="@{/categorias/guardar}" th:object="${categoria}" method="post" class="row g-3">

    <input type="hidden" th:field="*{id_categoria}">

    <div class="col-md-6">
      <label>Nombre</label>
      <input type="text" class="form-control" th:field="*{nombre}" required>
    </div>

    <div class="col-md-6">
      <label>Descripción</label>
      <input type="text" class="form-control" th:field="*{descripcion}">
    </div>

    <div class="col-md-3">
      <label>Estado</label>
      <select class="form-control" th:field="*{estado}">
        <option value="1">Activo</option>
        <option value="0">Inactivo</option>
      </select>
    </div>

    <div class="col-12">
      <button type="submit" class="btn btn-primary">Guardar</button>
      <a th:href="@{/categorias}" class="btn btn-secondary">Cancelar</a>
    </div>

  </form>

</div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</body>
</html>
