<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Categorías - AUTODOC</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link th:href="@{/css/autodoc.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">

  <h2 class="page-title mb-4">Categorías de Productos</h2>
  <a th:href="@{/categorias/nuevo}" class="btn btn-success mb-3">Nueva Categoría</a>

  <table class="table table-bordered table-striped">
    <thead><tr><th>ID</th><th>Nombre</th><th>Descripción</th><th>Estado</th><th>Acciones</th></tr></thead>
    <tbody>
      <tr th:each="c : ${categorias}">
        <td th:text="${c.id_categoria}"></td>
        <td th:text="${c.nombre}"></td>
        <td th:text="${c.descripcion}"></td>
        <td th:text="${c.estado == 1 ? 'Activo' : 'Inactivo'}"></td>
        <td>
          <a class="btn btn-warning btn-sm" th:href="@{/categorias/editar/{id}(id=${c.id_categoria})}">Editar</a>
          <a class="btn btn-danger btn-sm" th:href="@{/categorias/eliminar/{id}(id=${c.id_categoria})}"
             onclick="return confirm('¿Eliminar esta categoría?');">Eliminar</a>
        </td>
      </tr>
    </tbody>
  </table>

</div>
</body>
  <div th:insert="~{fragments/footer :: footer}"></div>
</html>
