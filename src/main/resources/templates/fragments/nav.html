<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <body>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <nav
      th:fragment="nav"
      class="navbar navbar-expand-lg navbar-dark bg-dark mb-4"
    >
      <div class="container">
        <a class="navbar-brand" th:href="@{/catalogo}">AUTODOC</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" th:href="@{/app/dashboard}">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/ventas}">Ventas</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/clientes}">Clientes</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/productos}">Productos</a>
            </li>
            <li class="nav-item" sec:authorize="hasRole('ADMIN')">
              <a class="nav-link" th:href="@{/categorias}">Categorías</a>
            </li>
            <li class="nav-item" sec:authorize="hasRole('ADMIN')">
              <a class="nav-link" th:href="@{/usuarios}">Usuarios</a>
            </li>
            <li class="nav-item" sec:authorize="hasRole('ADMIN')">
              <a class="nav-link" th:href="@{/roles}">Roles</a>
            </li>
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                data-bs-toggle="dropdown"
                >Reportes</a
              >
              <ul class="dropdown-menu">
                <li>
                  <a class="dropdown-item" th:href="@{/reportes/stock-bajo}"
                    >Stock bajo</a
                  >
                </li>
                <li>
                  <a class="dropdown-item" th:href="@{/reportes/cierre-caja}"
                    >Cierre de caja</a
                  >
                </li>
                <li>
                  <a class="dropdown-item" th:href="@{/reportes/ranking}"
                    >Ranking de productos</a
                  >
                </li>
              </ul>
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/catalogo}" target="_blank"
                >Catálogo público</a
              >
            </li>
          </ul>
          <span
            class="navbar-text text-white me-3"
            sec:authorize="isAuthenticated()"
          >
            <span sec:authentication="name"></span>
          </span>
          <form th:action="@{/app/logout}" method="post" class="d-flex">
            <button class="btn btn-outline-light btn-sm" type="submit">
              Cerrar sesión
            </button>
          </form>
        </div>
      </div>
    </nav>
    <div th:insert="~{fragments/footer :: footer}"></div>
  </body>
</html>
