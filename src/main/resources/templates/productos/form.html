<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Producto - AUTODOC</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link th:href="@{/css/autodoc.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">

  <h2 class="page-title mb-4">Registro de Producto</h2>

  <form th:action="@{/productos/guardar}" th:object="${producto}" method="post" class="row g-3">

    <input type="hidden" th:field="*{id_producto}">

    <div class="col-md-6">
      <label>Nombre</label>
      <input type="text" class="form-control" th:field="*{nombre}" required>
    </div>

    <div class="col-md-3">
      <label>Marca</label>
      <input type="text" class="form-control" th:field="*{marca}" required>
    </div>

    <div class="col-md-3">
      <label>Modelo</label>
      <input type="text" class="form-control" th:field="*{modelo}">
    </div>

    <div class="col-12">
      <label>Descripción</label>
      <textarea class="form-control" th:field="*{descripcion}"></textarea>
    </div>

    <div class="col-md-3">
      <label>Precio de venta (S/)</label>
      <input type="number" step="0.01" min="0" class="form-control" th:field="*{precio_venta}" required>
    </div>

    <div class="col-md-3">
      <label>Stock</label>
      <input type="number" min="0" class="form-control" th:field="*{stock}" required>
    </div>

    <div class="col-md-3">
      <label>Stock mínimo</label>
      <input type="number" min="0" class="form-control" th:field="*{stock_minimo}">
    </div>

    <div class="col-md-3">
      <label>Categoría</label>
      <select class="form-control" th:field="*{categoria}" required>
        <option value="">Seleccione</option>
        <option th:each="c : ${categorias}" th:value="${c.id_categoria}" th:text="${c.nombre}"></option>
      </select>
    </div>

    <div class="col-md-6">
      <label>URL de imagen</label>
      <input type="text" class="form-control" th:field="*{imagen_url}">
    </div>

    <div class="col-12">
      <button type="submit" class="btn btn-primary">Guardar</button>
      <a th:href="@{/productos}" class="btn btn-secondary">Cancelar</a>
    </div>

  </form>

</div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</body>
</html>
