<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Productos - AUTODOC</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link th:href="@{/css/autodoc.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">

  <h2 class="page-title mb-4">Catálogo de Productos</h2>
  <a th:href="@{/productos/nuevo}" class="btn btn-success mb-3">Nuevo Producto</a>

  <table class="table table-bordered table-striped">
    <thead>
      <tr><th>ID</th><th>Nombre</th><th>Marca</th><th>Categoría</th><th>Precio</th><th>Stock</th><th>Acciones</th></tr>
    </thead>
    <tbody>
      <tr th:each="p : ${productos}">
        <td th:text="${p.id_producto}"></td>
        <td th:text="${p.nombre}"></td>
        <td th:text="${p.marca}"></td>
        <td th:text="${p.categoria != null ? p.categoria.nombre : ''}"></td>
        <td th:text="${'S/ ' + #numbers.formatDecimal(p.precio_venta, 1, 2)}"></td>
        <td>
          <span th:text="${p.stock}"
                th:classappend="${p.stock != null and p.stock_minimo != null and p.stock <= p.stock_minimo} ? 'badge bg-danger' : ''"></span>
        </td>
        <td>
          <a class="btn btn-warning btn-sm" th:href="@{/productos/editar/{id}(id=${p.id_producto})}">Editar</a>
          <a class="btn btn-danger btn-sm" th:href="@{/productos/eliminar/{id}(id=${p.id_producto})}"
             onclick="return confirm('¿Eliminar este producto?');">Eliminar</a>
        </td>
      </tr>
    </tbody>
  </table>

</div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</body>
</html>
