<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Usuario - AUTODOC</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link th:href="@{/css/autodoc.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">

  <h2 class="page-title mb-4">Registro de Usuario</h2>

  <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post" class="row g-3">

    <input type="hidden" th:field="*{id_user}">

    <div class="col-md-4">
      <label>Usuario (username)</label>
      <input type="text" class="form-control" th:field="*{username}" required>
    </div>

    <div class="col-md-4">
      <label>Contraseña</label>
      <input type="password" class="form-control" th:field="*{passwordHash}"
             placeholder="Dejar en blanco para no modificarla">
      <small class="text-muted">Se cifra automáticamente con BCrypt al guardar.</small>
    </div>

    <div class="col-md-4">
      <label>Estado</label>
      <select class="form-control" th:field="*{estado}">
        <option value="1">Activo</option>
        <option value="0">Inactivo</option>
      </select>
    </div>

    <div class="col-md-6">
      <label>Persona</label>
      <select class="form-control" th:field="*{persona}" required>
        <option value="">Seleccione</option>
        <option th:each="p : ${personas}" th:value="${p.id_persona}"
                th:text="${p.nombres + ' ' + p.apellidos}"></option>
      </select>
    </div>

    <div class="col-md-6">
      <label>Rol</label>
      <select class="form-control" th:field="*{rol}" required>
        <option value="">Seleccione</option>
        <option th:each="r : ${roles}" th:value="${r.id_rol}" th:text="${r.nombre_rol}"></option>
      </select>
    </div>

    <div class="col-12">
      <button type="submit" class="btn btn-primary">Guardar</button>
      <a th:href="@{/usuarios}" class="btn btn-secondary">Cancelar</a>
    </div>

  </form>

</div>
</body>
  <div th:insert="~{fragments/footer :: footer}"></div>
</html>
