<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AUTODOC - Iniciar sesión</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link th:href="@{/css/autodoc.css}" rel="stylesheet">
</head>
<body>

<div class="login-shell">
  <div class="login-card">

    <div class="login-mark">AD</div>
    <div class="login-title">AUTODOC</div>
    <div class="login-sub">CompMarketPerú &middot; Panel de gestión</div>

    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
    <div class="alert alert-success" th:if="${mensaje}" th:text="${mensaje}"></div>

    <form th:action="@{/app/login}" method="post">

      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="mb-3">
        <label>Usuario</label>
        <input type="text" name="username" class="form-control" required autofocus>
      </div>

      <div class="mb-3">
        <label>Contraseña</label>
        <input type="password" name="password" class="form-control" required>
      </div>

      <button class="btn btn-primary" type="submit">Ingresar</button>

    </form>

    <p class="login-hint">
      admin / Admin2026$ &nbsp;|&nbsp; vendedor / Vendedor2026$
    </p>
  </div>
</div>

</body>
</html>
