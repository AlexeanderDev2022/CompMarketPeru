<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Clientes - AUTODOC</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link th:href="@{/css/autodoc.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">

  <h2 class="page-title mb-4">Listado de Clientes</h2>

  <a th:href="@{/clientes/nuevo}" class="btn btn-success mb-3">Nuevo Cliente</a>

  <table class="table table-bordered table-striped">
    <thead>
      <tr>
        <th>ID</th><th>Apellidos</th><th>Nombres</th><th>Doc.</th><th>N° Doc</th>
        <th>Email</th><th>Teléfono</th><th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="c : ${clientes}">
        <td th:text="${c.idCliente}"></td>
        <td th:text="${c.apellidos}"></td>
        <td th:text="${c.nombres}"></td>
        <td th:text="${c.tipoDoc}"></td>
        <td th:text="${c.nroDoc}"></td>
        <td th:text="${c.email}"></td>
        <td th:text="${c.telefono}"></td>
        <td>
          <a class="btn btn-warning btn-sm" th:href="@{/clientes/editar/{id}(id=${c.idCliente})}">Editar</a>
          <a class="btn btn-danger btn-sm" th:href="@{/clientes/eliminar/{id}(id=${c.idCliente})}"
             onclick="return confirm('¿Eliminar este cliente?');">Eliminar</a>
        </td>
      </tr>
    </tbody>
  </table>

</div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</body>
</html>
