<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Cliente - AUTODOC</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link th:href="@{/css/autodoc.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">

  <h2 class="page-title mb-4">Registro de Cliente</h2>

  <form th:action="@{/clientes/guardar}" th:object="${cliente}" method="post" class="row g-3">

    <input type="hidden" th:field="*{idCliente}">

    <div class="col-md-6">
      <label>Apellidos</label>
      <input type="text" class="form-control" th:field="*{apellidos}" required>
    </div>

    <div class="col-md-6">
      <label>Nombres</label>
      <input type="text" class="form-control" th:field="*{nombres}" required>
    </div>

    <div class="col-md-3">
      <label>Tipo de Documento</label>
      <select class="form-control" th:field="*{tipoDoc}">
        <option value="DNI">DNI</option>
        <option value="RUC">RUC</option>
        <option value="CE">CE</option>
        <option value="PASAPORTE">Pasaporte</option>
      </select>
    </div>

    <div class="col-md-3">
      <label>N° Documento</label>
      <input type="text" class="form-control" th:field="*{nroDoc}" required>
    </div>

    <div class="col-md-3">
      <label>Email</label>
      <input type="email" class="form-control" th:field="*{email}">
    </div>

    <div class="col-md-3">
      <label>Teléfono</label>
      <input type="text" class="form-control" th:field="*{telefono}">
    </div>

    <div class="col-12">
      <label>Dirección</label>
      <input type="text" class="form-control" th:field="*{direccion}">
    </div>

    <div class="col-12">
      <button type="submit" class="btn btn-primary">Guardar</button>
      <a th:href="@{/clientes}" class="btn btn-secondary">Cancelar</a>
    </div>

  </form>

</div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</body>
</html>
