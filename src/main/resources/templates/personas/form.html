<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Persona - AUTODOC</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link th:href="@{/css/autodoc.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">

  <h2 class="page-title mb-4">Registro de Persona</h2>

  <form th:action="@{/personas/guardar}" th:object="${persona}" method="post" class="row g-3">

    <input type="hidden" th:field="*{id_persona}">

    <div class="col-md-6">
      <label>Apellidos</label>
      <input type="text" class="form-control" th:field="*{apellidos}" required>
    </div>

    <div class="col-md-6">
      <label>Nombres</label>
      <input type="text" class="form-control" th:field="*{nombres}" required>
    </div>

    <div class="col-md-4">
      <label>DNI</label>
      <input type="text" class="form-control" th:field="*{dni}">
    </div>

    <div class="col-md-4">
      <label>Email</label>
      <input type="email" class="form-control" th:field="*{email}">
    </div>

    <div class="col-md-4">
      <label>Teléfono</label>
      <input type="text" class="form-control" th:field="*{telefono}">
    </div>

    <div class="col-12">
      <button type="submit" class="btn btn-primary">Guardar</button>
      <a th:href="@{/personas}" class="btn btn-secondary">Cancelar</a>
    </div>

  </form>

</div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</body>
</html>
