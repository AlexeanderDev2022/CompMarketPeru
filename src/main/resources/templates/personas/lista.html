<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Personas - AUTODOC</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link th:href="@{/css/autodoc.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">

  <h2 class="page-title mb-4">Personas Registradas</h2>
  <a th:href="@{/personas/nuevo}" class="btn btn-success mb-3">Nueva Persona</a>

  <table class="table table-bordered table-striped">
    <thead><tr><th>ID</th><th>Apellidos</th><th>Nombres</th><th>DNI</th><th>Email</th><th>Teléfono</th></tr></thead>
    <tbody>
      <tr th:each="p : ${personas}">
        <td th:text="${p.id_persona}"></td>
        <td th:text="${p.apellidos}"></td>
        <td th:text="${p.nombres}"></td>
        <td th:text="${p.dni}"></td>
        <td th:text="${p.email}"></td>
        <td th:text="${p.telefono}"></td>
      </tr>
    </tbody>
  </table>

</div>
  <div th:insert="~{fragments/footer :: footer}"></div>
</body>
</html>
